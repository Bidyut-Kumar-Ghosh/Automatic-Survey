<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 10;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 10px;
      width: 350px;
      height: 98vh;
      background: linear-gradient(135deg, #1a1f3a 0%, #16213e 50%, #0f3460 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(245, 87, 108, 0.1) 0%, transparent 50%);
      pointer-events: none;
      animation: gradientShift 15s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10px, -10px) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 18px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.2);
      height: 98%;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
      padding-bottom: 12px;
      border-bottom: 2px solid;
      border-image: linear-gradient(90deg, #667eea, #764ba2, #f5576c) 1;
      animation: slideDown 0.6s ease-out;
      position: relative;
    }

    .header-icon {
      font-size: 28px;
      animation: bounce 2s ease-in-out infinite;
      position: absolute;
      left: 0;
    }

    h3 {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 12px;
      animation: slideUp 0.5s ease-out backwards;
    }

    .form-group:nth-child(2) { animation-delay: 0.1s; }
    .form-group:nth-child(3) { animation-delay: 0.2s; }
    .form-group:nth-child(4) { animation-delay: 0.3s; }

    label {
      font-size: 10px;
      color: #667eea;
      display: block;
      margin-bottom: 5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid;
      border-color: #e2e8f0;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, #f8f9ff 0%, #fafbff 100%);
      color: #2d3748;
    }

    input:hover, select:hover {
      border-color: #667eea;
      background: #fff;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 5px rgba(102, 126, 234, 0.15),
                  0 8px 20px rgba(102, 126, 234, 0.25);
      transform: translateY(-2px);
    }

    input::placeholder {
      color: #a0aec0;
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      animation: slideUp 0.7s ease-out;
    }

    button {
      flex: 1;
      padding: 11px 14px;
      border-radius: 12px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    button:active::before {
      width: 300px;
      height: 300px;
    }

    #run {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #run:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    #run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: scale(0.98);
    }

    #stop {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      display: none;
      box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #stop:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    #status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      background: linear-gradient(135deg, #f0f4ff 0%, #fafbff 100%);
      color: #667eea;
      text-align: center;
      border: 2px solid #e2e8f0;
      animation: slideUp 0.5s ease-out;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
      display: none;
    }

    #status::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 0%;
      z-index: 0;
      opacity: 0.12;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #status > * {
      position: relative;
      z-index: 1;
    }

    #status.processing {
      background: linear-gradient(135deg, #fffaf0 0%, #fff8f0 100%);
      color: #ed8936;
      border-color: #fbd38d;
      animation: pulse 2s ease-in-out infinite;
    }

    #status.processing::before {
      background: linear-gradient(90deg, #ed8936 0%, #f59e0b 100%);
      width: var(--progress, 0%);
    }

    #status.success {
      background: linear-gradient(135deg, #f0fff4 0%, #ecfdf5 100%);
      color: #22863a;
      border-color: #c6f6d5;
      animation: slideUp 0.5s ease-out;
    }

    #status.error {
      background: linear-gradient(135deg, #fff5f5 0%, #ffe0e0 100%);
      color: #cb2431;
      border-color: #fca5a5;
    }

    .progress-container {
      display: none;
    }

    .progress-bar {
      display: none;
    }

    .progress-text {
      display: none;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    .footer {
      margin-top: auto;
      padding: 12px 0 8px 0;
      border-top: 2px solid;
      border-image: linear-gradient(90deg, #667eea, #764ba2, #f5576c) 1;
      font-size: 11px;
      text-align: center;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 0.9px;
      animation: slideUp 0.8s ease-out;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f5576c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="header-icon">🚀</div>
      <div>
        <h3>FormFlow</h3>
      </div>
    </div>

    <div class="form-group">
      <label>📋 Form Link / ID (Google or Microsoft)</label>
      <input id="formId" placeholder="Paste Google Forms or Microsoft Forms link" />
    </div>

    <div class="form-group">
      <label>🔢 Responses Count</label>
      <input id="count" type="number" value="10" min="1" />
    </div>

    <div class="form-group">
      <label>⚡ Speed</label>
      <select id="mode">
        <option value="ultra">⚡⚡ Ultra Fast (300ms)</option>
        <option value="fast">⚡ Fast (800ms)</option>
        <option value="safe" selected>🐢 Safe (2000ms)</option>
        <option value="slow">🐌 Slow (4000ms)</option>
      </select>
    </div>

    <div class="button-group">
      <button id="run">▶ Start</button>
      <button id="stop">⏹ Stop</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div id="status">🔄 Idle</div>

    <div class="footer">
      ✨ Created by Bidyut Kumar Ghosh
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
