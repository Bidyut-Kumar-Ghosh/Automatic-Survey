<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 10;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 10px;
      width: 360px;
      height: 98vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 30%, #312e81 60%, #1e3a8a 100%);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.25) 0%, transparent 50%),
                  radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.2) 0%, transparent 50%);
      pointer-events: none;
      animation: gradientShift 20s ease infinite;
    }

    @keyframes gradientShift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(15px, -15px) scale(1.1); }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(30px);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35),
                  inset 0 1px 0 rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.3);
      height: 98%;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 2px solid;
      border-image: linear-gradient(90deg, #8b5cf6 0%, #ec4899 50%, #f87171 100%) 1;
      animation: slideDown 0.6s ease-out;
      position: relative;
    }

    .header-icon {
      font-size: 32px;
      animation: bounce 2.5s ease-in-out infinite;
      position: absolute;
      left: 0;
    }

    h3 {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f97316 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .form-group {
      margin-bottom: 14px;
      animation: slideUp 0.5s ease-out backwards;
    }

    .form-group:nth-child(2) { animation-delay: 0.1s; }
    .form-group:nth-child(3) { animation-delay: 0.2s; }
    .form-group:nth-child(4) { animation-delay: 0.3s; }

    label {
      font-size: 11px;
      color: #8b5cf6;
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 2px solid;
      border-color: #e5e7eb;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, #f9fafb 0%, #ffffff 100%);
      color: #1f2937;
    }

    input:hover, select:hover {
      border-color: #8b5cf6;
      background: #ffffff;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.1);
    }

    input:focus, select:focus {
      outline: none;
      border-color: #8b5cf6;
      background: white;
      box-shadow: 0 0 0 6px rgba(139, 92, 246, 0.1),
                  0 8px 20px rgba(139, 92, 246, 0.2);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: #9ca3af;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      animation: slideUp 0.7s ease-out;
    }

    button {
      flex: 1;
      padding: 13px 16px;
      border-radius: 14px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    button:active::before {
      width: 300px;
      height: 300px;
    }

    #run {
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      color: white;
      box-shadow: 0 10px 25px rgba(139, 92, 246, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #run:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(139, 92, 246, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    #run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: scale(0.98);
    }

    #stop {
      background: linear-gradient(135deg, #f97316 0%, #ef4444 100%);
      color: white;
      display: none;
      box-shadow: 0 10px 25px rgba(249, 115, 22, 0.3),
                  inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    #stop:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(249, 115, 22, 0.4),
                  inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    #status {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      background: linear-gradient(135deg, #f0f4ff 0%, #fafbff 100%);
      color: #8b5cf6;
      text-align: center;
      border: 2px solid #e5e7eb;
      animation: slideUp 0.5s ease-out;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
      display: none;
    }

    #status::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: linear-gradient(90deg, #8b5cf6 0%, #ec4899 100%);
      width: 0%;
      z-index: 0;
      opacity: 0.12;
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #status > * {
      position: relative;
      z-index: 1;
    }

    #status.processing {
      background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
      color: #d97706;
      border-color: #fcd34d;
      animation: pulse 2s ease-in-out infinite;
    }

    #status.processing::before {
      background: linear-gradient(90deg, #d97706 0%, #f59e0b 100%);
      width: var(--progress, 0%);
    }

    #status.success {
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      color: #16a34a;
      border-color: #86efac;
      animation: slideUp 0.5s ease-out;
    }

    #status.error {
      background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
      color: #dc2626;
      border-color: #fca5a5;
    }

    .progress-container {
      display: none;
    }

    .progress-bar {
      display: none;
    }

    .progress-text {
      display: none;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .footer {
      margin-top: auto;
      padding: 14px 0 10px 0;
      border-top: 2px solid;
      border-image: linear-gradient(90deg, #8b5cf6, #ec4899, #f97316) 1;
      font-size: 11px;
      text-align: center;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 0.9px;
      animation: slideUp 0.8s ease-out;
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f97316 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="header-icon">🚀</div>
      <div>
        <h3>FormFlow</h3>
      </div>
    </div>

    <div class="form-group">
      <label>📋 Form Link / ID (Google or Microsoft)</label>
      <input id="formId" placeholder="Paste Google Forms or Microsoft Forms link" />
    </div>

    <div class="form-group">
      <label>🔢 Responses Count</label>
      <input id="count" type="number" value="10" min="1" />
    </div>

    <div class="form-group">
      <label>⚡ Speed</label>
      <select id="mode">
        <option value="ultra">⚡⚡ Ultra Fast (300ms)</option>
        <option value="fast">⚡ Fast (800ms)</option>
        <option value="safe" selected>🐢 Safe (2000ms)</option>
        <option value="slow">🐌 Slow (4000ms)</option>
      </select>
    </div>

    <div class="button-group">
      <button id="run">▶ Start</button>
      <button id="stop">⏹ Stop</button>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div id="status">🔄 Idle</div>

    <div class="footer">
      ✨ Created by Bidyut Kumar Ghosh
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
